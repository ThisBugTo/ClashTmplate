[custom]

; 直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN

; 💬 OpenAi
ruleset=💬 OpenAi,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

; GitHub & Docker
ruleset=💻 开发环境,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=💻 开发环境,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Docker.list

; GFW
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; 最终
ruleset=🐟 漏网之鱼,[]FINAL

; ===== 基础核心组 =====
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,3,150
custom_proxy_group=🚀 直连选择`url-test`^(?!.*中继).*`https://cp.cloudflare.com/generate_204`300,3,150
custom_proxy_group=🚀 中继选择`url-test`.*中继.*`https://cp.cloudflare.com/generate_204`300,3,150
custom_proxy_group=🚀 手动切换`select`.*

; ===== 专用组 =====
custom_proxy_group=💬 OpenAi(专用)`select`(?i).*AI.*

; ===== 业务分流 =====
custom_proxy_group=💬 OpenAi`select`[]🚀 直连选择`[]🚀 中继选择`[]🚀 手动切换`[]♻️ 自动选择`[]💬 OpenAi(专用)
custom_proxy_group=💻 开发环境`select`[]🚀 直连选择`[]🚀 中继选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=🚀 节点选择`select`[]🚀 直连选择`[]🚀 中继选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=🐟 漏网之鱼`select`[]🎯 全球直连`[]🚀 直连选择`[]🚀 中继选择`[]🚀 手动切换`[]♻️ 自动选择

enable_rule_generator=true
overwrite_original_rules=true
